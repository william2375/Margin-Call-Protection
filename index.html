<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質押維持率試算工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        :root {
            --brand-color: #b8916d;
            --brand-light: #fdfaf5;
            --brand-border: rgba(230, 186, 149, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-blur: blur(12px);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #fdfaf5 0%, #f7f0e6 100%);
            min-height: 100vh;
            color: #5f5b58;
        }

        /* 統一的毛玻璃卡片風格 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--brand-border);
            border-radius: 1.25rem;
            box-shadow: 0 8px 32px 0 rgba(184, 145, 109, 0.1);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(184, 145, 109, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(184, 145, 109, 0.15);
        }

        /* 統一輸入框風格 */
        .input-field {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(209, 213, 219, 0.5);
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--brand-color);
            box-shadow: 0 0 0 4px rgba(184, 145, 109, 0.15);
        }

        /* 按鈕風格 */
        .btn-action {
            background: white;
            border: 1px solid var(--brand-border);
            color: var(--brand-color);
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: var(--brand-color);
            color: white;
            box-shadow: 0 4px 12px rgba(184, 145, 109, 0.2);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .status-safe { background: rgba(16, 185, 129, 0.15); color: #059669; }
        .status-warn { background: rgba(245, 158, 11, 0.15); color: #d97706; }
        .status-danger { background: rgba(239, 68, 68, 0.15); color: #dc2626; }

        /* 表格與滾動條優化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #e6ba95; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <!-- 頂部標題與按鈕 -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold text-[#b8916d] tracking-tight">股票質押維持率計算機</h1>
                <p class="text-gray-400 text-sm mt-1">即時試算追繳壓力，提前做好資金調度</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadExample()" class="btn-action px-5 py-2.5 rounded-xl text-sm font-bold">
                    載入 0050 範例
                </button>
                <button onclick="resetForm()" class="px-5 py-2.5 rounded-xl text-sm font-bold bg-white/50 text-gray-400 hover:text-gray-600 border border-gray-200">
                    清空重置
                </button>
            </div>
        </header>

        <!-- 輸入區域：統一方格風格 -->
        <div class="glass-panel p-6 md:p-8 mb-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="space-y-3">
                    <label class="text-xs font-bold text-[#8c7a6b] uppercase tracking-wider">標的現價 (TWD)</label>
                    <input type="number" id="price" value="0" step="0.01" class="input-field w-full p-4 rounded-2xl text-xl font-bold text-orange-700" oninput="updateCalculations()">
                </div>
                <div class="space-y-3">
                    <label class="text-xs font-bold text-[#8c7a6b] uppercase tracking-wider">擔保張數 (張)</label>
                    <input type="number" id="volume" value="0" class="input-field w-full p-4 rounded-2xl text-xl" oninput="updateCalculations()">
                </div>
                <div class="space-y-3">
                    <label class="text-xs font-bold text-[#8c7a6b] uppercase tracking-wider">借款金額 (萬元)</label>
                    <input type="number" id="loan_wan" value="0" class="input-field w-full p-4 rounded-2xl text-xl" oninput="updateCalculations()">
                </div>
                <div class="space-y-3">
                    <label class="text-xs font-bold text-[#8c7a6b] uppercase tracking-wider">借款年利率 (%)</label>
                    <input type="number" id="rate" value="2.88" step="0.01" class="input-focus w-full p-4 rounded-2xl text-xl border border-gray-200 bg-white/50" oninput="updateCalculations()">
                </div>
            </div>
        </div>

        <!-- 關鍵摘要：統一方格風格 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-panel p-8 flex flex-col items-center justify-center text-center">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">當前維持率</p>
                <div id="statusBadge" class="status-badge mb-3">待輸入</div>
                <p id="currentRatio" class="text-4xl font-black text-[#b8916d]">0.00%</p>
            </div>
            
            <div class="glass-panel p-8 flex flex-col items-center justify-center text-center relative overflow-hidden">
                <!-- 裝飾側邊條 -->
                <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-[#b8916d]"></div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">預估年利息支出</p>
                <p id="annualInterest" class="text-4xl font-black text-gray-700">0 元</p>
                <p class="text-xs font-medium text-gray-400 mt-3">月負擔：<span id="monthlyInterest" class="text-[#b8916d]">0</span> 元</p>
            </div>

            <div class="glass-panel p-8 flex flex-col items-center justify-center text-center">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">追繳價格 (130%)</p>
                <p id="marginCallPrice" class="text-4xl font-black text-red-500">0.00</p>
                <p class="text-xs font-medium text-gray-400 mt-3">容忍下跌空間：<span id="dropPercent" class="text-red-500">0</span>%</p>
            </div>
        </div>

        <!-- 壓力測試表格 -->
        <div class="glass-panel overflow-hidden">
            <div class="bg-white/30 p-5 border-b border-white/20">
                <h3 class="font-bold text-[#8c7a6b] flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11.707 4.707a1 1 0 00-1.414-1.414L10 9.586 8.707 8.293a1 1 0 00-1.414 0l-2 2a1 1 0 101.414 1.414L8 10.414l1.293 1.293a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                    風險壓力測試模擬
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase tracking-widest bg-white/20">
                            <th class="p-5 font-bold border-b border-white/20 text-center">跌幅級距</th>
                            <th class="p-5 font-bold border-b border-white/20 text-right">預估股價</th>
                            <th class="p-5 font-bold border-b border-white/20 text-right">預計維持率</th>
                            <th class="p-5 font-bold border-b border-white/20 text-right">需補倉金額 (回166%)</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody" class="text-sm">
                        <!-- JS 動態插入 -->
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-12 mb-10 text-center text-gray-400 text-[10px] leading-loose tracking-widest uppercase">
            <p>※ 維持率 = (市值 / 借款金額) • 補倉目標：166%</p>
            <p>© 2026 MARGIN RISK CALCULATOR • 所有數據僅供參考</p>
        </footer>
    </div>

    <script>
        const inputIds = ['price', 'volume', 'loan_wan', 'rate'];
        
        function loadExample() {
            document.getElementById('price').value = 84.15;
            document.getElementById('volume').value = 10;
            document.getElementById('loan_wan').value = 25;
            document.getElementById('rate').value = 2.88;
            updateCalculations();
        }

        function resetForm() {
            inputIds.forEach(id => {
                document.getElementById(id).value = id === 'rate' ? 2.88 : 0;
            });
            updateCalculations();
        }

        function updateCalculations() {
            const price = parseFloat(document.getElementById('price').value) || 0;
            const volume = parseFloat(document.getElementById('volume').value) || 0;
            const loan = (parseFloat(document.getElementById('loan_wan').value) || 0) * 10000;
            const rate = parseFloat(document.getElementById('rate').value) || 0;

            const marketValue = price * volume * 1000;
            const currentRatio = loan > 0 ? (marketValue / loan) : 0;
            
            // 維持率與標籤
            document.getElementById('currentRatio').innerText = (currentRatio * 100).toFixed(2) + '%';
            const badge = document.getElementById('statusBadge');
            if (currentRatio === 0) {
                badge.innerText = "待輸入"; badge.className = "status-badge bg-gray-100 text-gray-400";
            } else if (currentRatio >= 1.66) {
                badge.innerText = "SAFE 安全"; badge.className = "status-badge status-safe";
            } else if (currentRatio >= 1.3) {
                badge.innerText = "WARNING 預警"; badge.className = "status-badge status-warn";
            } else {
                badge.innerText = "DANGER 危險"; badge.className = "status-badge status-danger";
            }

            // 利息
            const annualInt = loan * (rate / 100);
            document.getElementById('annualInterest').innerText = Math.round(annualInt).toLocaleString() + ' 元';
            document.getElementById('monthlyInterest').innerText = Math.round(annualInt / 12).toLocaleString();
            
            // 破盤價
            const callPrice = loan > 0 && volume > 0 ? (loan * 1.3) / (volume * 1000) : 0;
            document.getElementById('marginCallPrice').innerText = callPrice.toFixed(2);
            document.getElementById('dropPercent').innerText = price > 0 ? ((1 - (callPrice / price)) * 100).toFixed(1) : 0;

            // 表格更新
            const tbody = document.getElementById('resultTableBody');
            tbody.innerHTML = '';
            for (let i = 0; i >= -70; i -= 5) {
                const dropRatio = 1 + (i / 100);
                const dropPrice = price * dropRatio;
                const dropMarketValue = dropPrice * volume * 1000;
                const dropMaintenanceRatio = loan > 0 ? (dropMarketValue / loan) : 0;
                
                const targetValue = loan * 1.66;
                let refill = targetValue - dropMarketValue;
                refill = refill > 0 ? Math.ceil(refill) : 0;

                const row = document.createElement('tr');
                row.className = 'hover:bg-white/40 transition-colors border-b border-white/10';
                
                let ratioColor = '';
                if (dropMaintenanceRatio > 0 && dropMaintenanceRatio < 1.3) ratioColor = 'text-red-500 font-bold';
                else if (dropMaintenanceRatio > 0 && dropMaintenanceRatio < 1.66) ratioColor = 'text-amber-600 font-bold';

                row.innerHTML = `
                    <td class="p-5 text-center font-bold text-gray-300">${i === 0 ? 'BASE' : i + '%'}</td>
                    <td class="p-5 text-right font-medium">${dropPrice.toFixed(2)}</td>
                    <td class="p-5 text-right ${ratioColor}">${(dropMaintenanceRatio * 100).toFixed(2)}%</td>
                    <td class="p-5 text-right font-mono text-gray-500">${refill > 0 ? refill.toLocaleString() + ' 元' : '-'}</td>
                `;
                tbody.appendChild(row);
            }
        }

        updateCalculations();
    </script>
</body>
</html>
